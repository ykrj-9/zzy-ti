    color: var(--text-main);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  /* 核心容器 */
  .container {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(98, 124, 109, 0.08);
    padding: 40px 30px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    position: relative;
    box-sizing: border-box;
    animation: fadeInContainer 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 滑順隱藏與顯示 */
  .screen { transition: opacity var(--transition-speed) ease-in-out; }

    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    line-height: 1.5;
    outline: none;
  }

  .btn-option:hover { 
    background-color: var(--theme-light); 
    border-color: var(--theme-green);
    transform: translateY(-1px);
  }
  
  .btn-option.selected {
    background-color: var(--theme-green);

    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--theme-border);

    height: 100%; 
    width: 0%; 
    border-radius: 6px;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);

  "W_011": { name: "《Kiss You Goodbye》互联网活跃爱妻", desc: "在微博上会发一些宝宝我爱你呀，也会和其他爱妻一起尖叫一起嗨！自信又热情，恨不得让大家都知道自己的宝宝有多帅^q^。", img: "./end.png" },
  "W_010": { name: "《Moonlight》月下浪漫造梦师", desc: "热爱写文或画图产出，在平台上跟大家分享对真源的各种美好幻想，心思极度细腻温柔，用爱发电。", img: "./cry.png" },
  "W_001": { name: "《年》专属秘密守护者", desc: "喜欢自己追星，微博主页上全是对他的爱，觉得小源是自己专属的宝藏。", img: "./cry.png" },
  "W_000": { name: "《月之浮想》沉浸式幻梦糖", desc: "最喜欢戴上耳机听他的歌，在自己的世界里脑补各种情境，完全沉浸在与小源的宇宙里，浪漫地爱着他。", img: "./cry.png" }
};

let currentQ = 0, scores = { A: 0, B: 0, C: 0, D: 0 };
let historyRecords = [];
let tempSelection = null;

// 打亂陣列順序的通用函數
function shuffle(arr) { 
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startQuiz() {
  // 隨機打亂題目順序
  shuffle(questions);
  
  // 隨機打亂每一題內部的「選項順序」
  questions.forEach(q => shuffle(q.options));
  
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  if (currentQ >= questions.length) { calculateResult(); return; }
  
  const wrapper = document.getElementById('quiz-content-wrapper');
  
  wrapper.style.opacity = 0;
  document.getElementById('next-action-btn').classList.add('hidden');
  tempSelection = null;

  document.getElementById('prev-btn').classList.toggle('hidden', currentQ === 0);

  setTimeout(() => {
    let q = questions[currentQ];
    document.getElementById('progress-text').innerText = `${currentQ + 1} / 16`;
    document.getElementById('question-text').innerText = q.text;
    document.getElementById('options-container').innerHTML = q.options.map(o => 
      `<button class="btn-option" onclick="handleSelect(this, '${q.axis}', ${o.val})">${o.text}</button>`
    ).join('');
    
    wrapper.style.opacity = 1;
  }, 400); 
}

function handleSelect(el, axis, val) {
  document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  tempSelection = { axis, val };
  document.getElementById('next-action-btn').classList.remove('hidden');
}

function goNext() {
  if (!tempSelection) return;
  historyRecords.push(tempSelection);
  scores[tempSelection.axis] += tempSelection.val;
  currentQ++;
  showQuestion();
}

function prevQuestion() {
  if (currentQ <= 0) return;
  currentQ--;
  let last = historyRecords.pop();
  scores[last.axis] -= last.val;
  showQuestion();
}

function calculateResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  
  let k = (scores.C>=0?'M_':'W_') + (scores.A>=0?'1':'0') + (scores.B>=0?'1':'0') + (scores.D>=0?'1':'0');
  let r = resultsMap[k];
  
 let splitIndex = r.name.indexOf('》') + 1;
  let mainTitle = r.name.substring(0, splitIndex);
  let subTitle = r.name.substring(splitIndex);

  // 2. 用 innerHTML 插入带有样式的排版
  document.getElementById('result-title').innerHTML = `
    <div style="color: var(--theme-green); font-size: 26px; font-weight: bold; margin-bottom: 6px; letter-spacing: 1.5px;">
      ${mainTitle}
    </div>
    <div style="color: #d8b8b4; font-size: 16px; font-weight: 500; letter-spacing: 1px;">
      ${subTitle}
    </div>
`;
  document.getElementById('result-char-img').src = r.img;
  document.getElementById('result-desc').innerText = r.desc;

  const dims = [
    {id:'a', l:'线下er', r:'线上er', v:scores.A, color:'var(--bar-a-blue)'},
    {id:'b', l:'外向er', r:'内向er', v:scores.B, color:'var(--bar-b-purple)'},
    {id:'c', l:'心理属性', r:'生理属性', v:scores.C, color:'var(--bar-c-pink)'},
    {id:'d', l:'太阳属性', r:'月亮属性', v:scores.D, color:'var(--bar-d-green)'}
  ];

  // 生成 MBTI 风格的进度条
  document.getElementById('sliders-box').innerHTML = dims.map(d => {
    // 1. 计算左右两边的百分比
    let leftP = Math.max(0, Math.min(100, Math.round(((d.v + 8) / 16) * 100)));
    let rightP = 100 - leftP;
    
    // 2. 判断哪边比较多 (大于等于50%算左边胜出)
    let leftIsDominant = leftP >= 50;
    
    // 3. 设定两边的颜色 (多的那方套用你设定的专属色，少的那方变浅灰色)
    let leftBarColor = leftIsDominant ? d.color : '#eef2f0';
    let rightBarColor = !leftIsDominant ? d.color : '#eef2f0';
    
    // 4. 设定文字颜色 (让百分比数字和底下的标签也能跟着变色，更有质感)
    let leftTextColor = leftIsDominant ? d.color : 'var(--text-light)';
    let rightTextColor = !leftIsDominant ? d.color : 'var(--text-light)';

    return `
    <div style="margin-bottom: 26px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
        <span style="width: 45px; text-align: left; font-size: 16px; font-weight: bold; color: ${leftTextColor};">${leftP}%</span>
        
        <div style="flex-grow: 1; display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin: 0 10px; background: #eef2f0;">
          <div id="fill-l-${d.id}" style="width: 0%; background: ${leftBarColor}; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);"></div>
          <div id="fill-r-${d.id}" style="width: 0%; background: ${rightBarColor}; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);"></div>
        </div>

        <span style="width: 45px; text-align: right; font-size: 16px; font-weight: bold; color: ${rightTextColor};">${rightP}%</span>
      </div>
      
      <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 600;">
        <span style="color: ${leftTextColor}; transition: color 0.4s;">${d.l}</span>
        <span style="color: ${rightTextColor}; transition: color 0.4s;">${d.r}</span>
      </div>
    </div>`;
  }).join('');
  
  // 触发动画，让两边的颜色分别往中间长
  dims.forEach(d => {
    let leftP = Math.max(0, Math.min(100, Math.round(((d.v + 8) / 16) * 100)));
    let rightP = 100 - leftP;
    setTimeout(() => { 
      document.getElementById(`fill-l-${d.id}`).style.width = leftP + '%'; 
      document.getElementById(`fill-r-${d.id}`).style.width = rightP + '%'; 
    }, 200);
  });
} //

</script>
</body>
</html>
